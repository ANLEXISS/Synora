# Local web accounts. Replace password_hash values with hashes generated by:
#   make hash-password PASSWORD='...'
# Never commit plaintext passwords or reuse the API token here.
users:
  - id: user_alexis
    login: alexis
    resident_id: alexis
    role: admin
    enabled: true
    password_hash: "$2a$10$REPLACE_WITH_BCRYPT_HASH"

  - id: user_carole
    login: carole
    resident_id: carole
    role: resident
    enabled: true
    password_hash: "$2a$10$REPLACE_WITH_BCRYPT_HASH"
