catalog:
  schema_version: 1
  namespace: synora.cge
  authority_ceiling: advisory
  categories:
    - raw_measurement
    - external_event
    - normalized_observation
    - context_fact
    - derived_fact
    - entity_reference
    - relation
    - hypothesis
    - evidence
    - assessment
    - cognitive_situation
    - recommendation
    - historical_comparison
    - feedback
    - diagnostic
    - audit_record
    - configuration
  trust_levels:
    - untrusted
    - sensor_reported
    - validated
    - derived
    - corroborated
    - confirmed
    - invalidated
  sensitivity_classes:
    - public
    - operational
    - personal
    - sensitive_personal
    - biometric
    - security_sensitive
    - secret
  authority_levels:
    - descriptive
    - diagnostic
    - advisory
    - authorized_decision
    - authorized_action
  stability_statuses:
    - experimental
    - internal
    - stable
    - deprecated
  data_controls:
    - name: identity
      classification: sensitive_personal
      memory: allowed_only_at_core_to_cge_boundary
      logs: forbidden_raw
      journal: protected_only
      wal: protected_only
      ledger: protected_only
      protection: cgeid_v1_entity
    - name: candidate_identities
      classification: sensitive_personal
      memory: allowed_as_bounded_candidates
      logs: forbidden_raw
      journal: protected_only
      wal: protected_only
      ledger: protected_only
      protection: cgeid_v1_entity
    - name: device_id
      classification: sensitive_personal
      memory: allowed_at_core_and_boundary
      logs: forbidden_raw_in_cge
      journal: protected_only
      wal: protected_only
      ledger: protected_only
      protection: cgeid_v1_device
    - name: camera_id
      classification: sensitive_personal
      memory: allowed_at_core_and_boundary
      logs: forbidden_raw_in_cge
      journal: protected_only
      wal: protected_only
      ledger: protected_only
      protection: cgeid_v1_device
    - name: event_id
      classification: sensitive_personal
      memory: allowed_at_core_and_boundary
      logs: forbidden_raw_in_cge
      journal: protected_only
      wal: protected_only
      ledger: protected_only
      protection: cgeid_v1_observation
    - name: clip_id
      classification: sensitive_personal
      memory: allowed_at_core_and_boundary
      logs: forbidden_raw_in_cge
      journal: protected_only
      wal: protected_only
      ledger: protected_only
      protection: cgeid_v1_clip
    - name: track_id
      classification: sensitive_personal
      memory: allowed_at_core_and_boundary
      logs: forbidden_raw_in_cge
      journal: protected_only
      wal: protected_only
      ledger: protected_only
      protection: cgeid_v1_track
    - name: activation_id
      classification: sensitive_personal
      memory: allowed_at_core_and_boundary
      logs: forbidden_raw_in_cge
      journal: protected_only
      wal: protected_only
      ledger: protected_only
      protection: cgeid_v1_activation
    - name: sequence_key
      classification: operational
      memory: allowed_at_core_and_boundary
      logs: protected_or_omitted
      journal: protected_only
      wal: protected_only
      ledger: protected_only
      protection: cgeid_v1_sequence
    - name: ip
      classification: security_sensitive
      memory: source_specific
      logs: redacted_or_omitted
      journal: prohibited
      wal: prohibited
      ledger: prohibited
      protection: no_cge_persistence
    - name: tokens
      classification: secret
      memory: configuration_boundary_only
      logs: forbidden
      journal: prohibited
      wal: prohibited
      ledger: prohibited
      protection: secret_manager_out_of_scope
    - name: images
      classification: biometric
      memory: source_specific_not_cge
      logs: forbidden
      journal: prohibited
      wal: prohibited
      ledger: prohibited
      protection: no_cge_persistence
    - name: videos
      classification: biometric
      memory: source_specific_not_cge
      logs: forbidden
      journal: prohibited
      wal: prohibited
      ledger: prohibited
      protection: no_cge_persistence
    - name: embeddings
      classification: biometric
      memory: source_specific_not_cge
      logs: forbidden
      journal: prohibited
      wal: prohibited
      ledger: prohibited
      protection: no_cge_persistence
    - name: faces
      classification: biometric
      memory: source_specific_not_cge
      logs: forbidden
      journal: prohibited
      wal: prohibited
      ledger: prohibited
      protection: no_cge_persistence
    - name: localisation
      classification: sensitive_personal
      memory: allowed_as_node_zone_context
      logs: category_only
      journal: node_zone_only
      wal: node_zone_only
      ledger: category_or_fingerprint_only
      protection: preserve_topology_without_raw_identity
    - name: resident_presence
      classification: sensitive_personal
      memory: allowed_as_context_enum
      logs: aggregate_or_enum_only
      journal: enum_only
      wal: enum_only
      ledger: aggregate_or_enum_only
      protection: no_raw_identity
    - name: topology
      classification: operational
      memory: allowed
      logs: node_zone_only
      journal: node_zone_only
      wal: node_zone_only
      ledger: fingerprint_or_category_only
      protection: retain_node_and_zone_semantics

contracts:
  - id: synora.contract.external-source.v1
    category: raw_measurement
    owner: ingest
    producers: [external_source]
    consumers: [bus]
    transport: adapter_input
    persistence: []
    authority: descriptive
    trust: untrusted
    sensitivity: operational
    status: internal
    justification: Adapter-only input; not a durable CGE contract.
    fields:
      - name: source_payload
        type: opaque_object
        required: true
        nullable: false
        description: External source payload before contract validation.
        source: external_source
        trust: untrusted
        sensitivity: operational
        protection: reject_unvalidated_payload
        persistence: []
        retention: none
        validation: adapter_schema_and_size_limit

  - id: synora.contract.bus.message.v1
    category: external_event
    owner: bus
    producers: [ingest, services]
    consumers: [ingest, historical_core]
    transport: bus
    persistence: []
    authority: descriptive
    trust: sensor_reported
    sensitivity: operational
    status: stable
    fields:
      - name: id
        type: string
        required: false
        nullable: false
        description: Bus message identifier.
        source: producer
        trust: sensor_reported
        sensitivity: operational
        protection: none_at_bus_boundary
        persistence: []
        retention: transport_lifetime
        validation: bounded_scalar
      - name: type
        type: string
        required: true
        nullable: false
        description: Contract event or command type.
        source: producer
        trust: sensor_reported
        sensitivity: operational
        protection: none
        persistence: []
        retention: transport_lifetime
        validation: known_contract_type
      - name: timestamp
        type: time_rfc3339_or_epoch
        required: false
        nullable: false
        description: Producer-reported event time; not receipt time.
        source: producer
        trust: sensor_reported
        sensitivity: operational
        protection: none
        persistence: []
        retention: transport_lifetime
        validation: parseable_time
      - name: payload
        type: json_object
        required: false
        nullable: false
        description: Typed event payload decoded by the historical Core.
        source: producer
        trust: untrusted
        sensitivity: sensitive_personal
        protection: boundary_validation
        persistence: []
        retention: transport_lifetime
        validation: size_and_json_validation

  - id: synora.contract.ingested-event.v1
    category: external_event
    owner: ingest
    producers: [ingest]
    consumers: [historical_core, cge_boundary]
    transport: internal
    persistence: [synora.store.core-state]
    authority: descriptive
    trust: validated
    sensitivity: sensitive_personal
    status: stable
    fields:
      - name: event_id
        type: string
        required: false
        nullable: false
        description: Event identity used by historical Core ingestion.
        source: bus_message.id_or_generated
        trust: validated
        sensitivity: sensitive_personal
        protection: cge_pseudonymization_only_after_core
        persistence: [synora.store.core-state]
        retention: core_policy
        validation: bounded_scalar
      - name: event_type
        type: string
        required: true
        nullable: false
        description: Normalized contract event type.
        source: bus_message.type
        trust: validated
        sensitivity: operational
        protection: none
        persistence: [synora.store.core-state]
        retention: core_policy
        validation: contract_normalization
      - name: device_id
        type: string
        required: false
        nullable: false
        description: Source device or camera identifier.
        source: bus_message.payload
        trust: sensor_reported
        sensitivity: sensitive_personal
        protection: cge_pseudonymization_only_after_core
        persistence: [synora.store.core-state]
        retention: core_policy
        validation: bounded_scalar
      - name: observed_at
        type: time
        required: false
        nullable: false
        description: Time reported by the event, when present.
        source: bus_message.timestamp
        trust: sensor_reported
        sensitivity: operational
        protection: none
        persistence: [synora.store.core-state]
        retention: core_policy
        validation: zero_allowed_for_legacy_core_paths

  - id: synora.contract.historical-decision.v1
    category: assessment
    owner: historical_core
    producers: [historical_core]
    consumers: [automation, cge_comparison]
    transport: internal
    persistence: [synora.store.core-state]
    authority: authorized_decision
    trust: validated
    sensitivity: security_sensitive
    status: stable
    fields:
      - name: decision_id
        type: string
        required: false
        nullable: false
        description: Historical decision reference.
        source: historical_core
        trust: validated
        sensitivity: security_sensitive
        protection: pseudonymized_in_cge_copy
        persistence: [synora.store.core-state]
        retention: core_policy
        validation: bounded_scalar
      - name: event_id
        type: string
        required: false
        nullable: false
        description: Source event reference owned by historical Core.
        source: historical_core
        trust: validated
        sensitivity: sensitive_personal
        protection: pseudonymized_in_cge_copy
        persistence: [synora.store.core-state]
        retention: core_policy
        validation: bounded_scalar
      - name: decided_at
        type: time
        required: false
        nullable: false
        description: Time at which the historical decision was made.
        source: historical_core
        trust: validated
        sensitivity: security_sensitive
        protection: none
        persistence: [synora.store.core-state]
        retention: core_policy
        validation: parseable_time

  - id: synora.cge.boundary-event.v1
    category: normalized_observation
    owner: cge
    producers: [historical_core]
    consumers: [cge_adapter]
    transport: internal
    persistence: []
    authority: descriptive
    trust: validated
    sensitivity: sensitive_personal
    status: stable
    fields:
      - name: id
        type: string
        required: true
        nullable: false
        description: Raw Core event ID at the non-persistent boundary.
        source: ingested_event.event_id
        trust: validated
        sensitivity: sensitive_personal
        protection: protect_raw_before_cge_storage
        persistence: []
        retention: memory_only
        validation: bounded_scalar
      - name: event_type
        type: string
        required: true
        nullable: false
        description: Normalized event type.
        source: ingested_event.event_type
        trust: validated
        sensitivity: operational
        protection: none
        persistence: []
        retention: memory_only
        validation: allowlist_checked
      - name: identity_and_references
        type: scalar_identifier_set
        required: false
        nullable: false
        description: Raw Core identifiers; never durable in this form.
        source: ingested_event
        trust: sensor_reported
        sensitivity: sensitive_personal
        protection: protect_raw_before_persistence
        persistence: []
        retention: memory_only
        validation: bounded_no_newline

  - id: synora.cge.observation.v1
    category: normalized_observation
    owner: cge
    producers: [cge_adapter]
    consumers: [chains, context, episodes, shadow_workflow, comparison]
    transport: internal
    persistence: [synora.store.cge-journal, synora.store.cge-generations, synora.store.workflow-wal, synora.store.workflow-checkpoint]
    authority: descriptive
    trust: derived
    sensitivity: sensitive_personal
    status: internal
    fields:
      - name: observation_id
        type: protected_identifier_observation
        required: true
        nullable: false
        description: Stable protected reference for the source event.
        source: boundary_event.id
        trust: derived
        sensitivity: sensitive_personal
        protection: cgeid_v1_observation
        persistence: [synora.store.cge-journal, synora.store.workflow-wal, synora.store.workflow-checkpoint]
        retention: configured_store_policy
        validation: cgeid_v1_observation
      - name: event_type
        type: string
        required: true
        nullable: false
        description: Admitted event type.
        source: boundary_event.event_type
        trust: validated
        sensitivity: operational
        protection: none
        persistence: [synora.store.cge-journal, synora.store.workflow-wal]
        retention: configured_store_policy
        validation: allowlist_checked
      - name: entity_id
        type: protected_identifier_entity
        required: false
        nullable: false
        description: Protected known subject reference; absent for unknown subjects.
        source: boundary_event.identity
        trust: derived
        sensitivity: sensitive_personal
        protection: cgeid_v1_entity
        persistence: [synora.store.cge-journal, synora.store.workflow-wal, synora.store.workflow-checkpoint]
        retention: configured_store_policy
        validation: cgeid_v1_entity_or_empty
      - name: device_id
        type: protected_identifier_device
        required: false
        nullable: false
        description: Protected source device reference.
        source: boundary_event.device_id
        trust: derived
        sensitivity: sensitive_personal
        protection: cgeid_v1_device
        persistence: [synora.store.cge-journal, synora.store.workflow-wal]
        retention: configured_store_policy
        validation: cgeid_v1_device_or_empty
      - name: clip_track_activation_sequence
        type: protected_identifier_set
        required: false
        nullable: false
        description: Protected media, tracking, activation and ordering references.
        source: boundary_event
        trust: derived
        sensitivity: sensitive_personal
        protection: cgeid_v1_by_kind
        persistence: [synora.store.cge-journal, synora.store.workflow-wal]
        retention: configured_store_policy
        validation: cgeid_v1_by_kind_or_empty
      - name: observed_at
        type: time
        required: true
        nullable: false
        description: Time at which the source observation occurred.
        source: boundary_event.timestamp
        trust: sensor_reported
        sensitivity: operational
        protection: none
        persistence: [synora.store.cge-journal, synora.store.workflow-wal]
        retention: configured_store_policy
        validation: non_zero_time

  - id: synora.cge.context-frame.v1
    category: context_fact
    owner: cge_context
    producers: [context_provider]
    consumers: [chains, episodes, workflow]
    transport: internal
    persistence: [synora.store.cge-journal, synora.store.workflow-wal, synora.store.workflow-checkpoint]
    authority: descriptive
    trust: derived
    sensitivity: personal
    status: internal
    fields:
      - name: observation_id
        type: protected_identifier_observation
        required: true
        nullable: false
        description: Observation to which the frame is attached.
        source: observation.observation_id
        trust: derived
        sensitivity: sensitive_personal
        protection: cgeid_v1_observation
        persistence: [synora.store.cge-journal, synora.store.workflow-checkpoint]
        retention: configured_store_policy
        validation: cgeid_v1_observation
      - name: topology
        type: topology_reference
        required: false
        nullable: false
        description: Node, parent and zone context needed for topology resolution.
        source: core_context_provider
        trust: validated
        sensitivity: operational
        protection: retain_node_and_zone_semantics
        persistence: [synora.store.workflow-checkpoint]
        retention: configured_store_policy
        validation: topology_or_partial_context
      - name: occupancy_and_house_mode
        type: enum_pair
        required: true
        nullable: false
        description: Contextual domestic state; descriptive only.
        source: core_context_provider
        trust: corroborated
        sensitivity: personal
        protection: no_raw_identity
        persistence: [synora.store.cge-journal, synora.store.workflow-checkpoint]
        retention: configured_store_policy
        validation: known_enum_values
      - name: fingerprint
        type: sha256_fingerprint
        required: true
        nullable: false
        description: Deterministic frame fingerprint.
        source: cge_context
        trust: derived
        sensitivity: operational
        protection: hash_only
        persistence: [synora.store.workflow-checkpoint]
        retention: configured_store_policy
        validation: deterministic_fingerprint

  - id: synora.cge.episode-snapshot.v1
    category: derived_fact
    owner: cge_episodes
    producers: [episode_engine]
    consumers: [workflow, diagnostics, comparison]
    transport: internal
    persistence: [synora.store.workflow-wal, synora.store.workflow-checkpoint]
    authority: descriptive
    trust: derived
    sensitivity: sensitive_personal
    status: experimental
    fields:
      - name: episode_id
        type: protected_or_derived_identifier
        required: true
        nullable: false
        description: Bounded episode aggregate identity.
        source: episode_engine
        trust: derived
        sensitivity: sensitive_personal
        protection: derived_fingerprint_only
        persistence: [synora.store.workflow-wal, synora.store.workflow-checkpoint]
        retention: configured_store_policy
        validation: non_empty_bounded
      - name: observations
        type: bounded_observation_reference_list
        required: true
        nullable: false
        description: Redacted observation references in the episode window.
        source: cge_observation
        trust: derived
        sensitivity: sensitive_personal
        protection: cgeid_v1_references
        persistence: [synora.store.workflow-wal, synora.store.workflow-checkpoint]
        retention: configured_store_policy
        validation: bounded_list
      - name: status_and_revision
        type: status_revision
        required: true
        nullable: false
        description: Episode lifecycle and monotonic revision.
        source: episode_engine
        trust: derived
        sensitivity: operational
        protection: none
        persistence: [synora.store.workflow-wal, synora.store.workflow-checkpoint]
        retention: configured_store_policy
        validation: lifecycle_and_monotonic_revision

  - id: synora.cge.fact-set.v1
    category: derived_fact
    owner: cge_situationfacts
    producers: [fact_engine]
    consumers: [hypothesis_engine, workflow, diagnostics]
    transport: internal
    persistence: [synora.store.workflow-wal, synora.store.workflow-checkpoint]
    authority: descriptive
    trust: derived
    sensitivity: operational
    status: experimental
    fields:
      - name: facts
        type: fact_list
        required: true
        nullable: false
        description: Bounded normalized facts with quality and origin.
        source: episode_and_context
        trust: derived
        sensitivity: operational
        protection: no_raw_identity
        persistence: [synora.store.workflow-wal, synora.store.workflow-checkpoint]
        retention: configured_store_policy
        validation: fact_schema_and_bounds
      - name: source_observation_ids
        type: protected_identifier_list
        required: false
        nullable: false
        description: Protected observations supporting the fact set.
        source: cge_observation
        trust: derived
        sensitivity: sensitive_personal
        protection: cgeid_v1_observation
        persistence: [synora.store.workflow-wal, synora.store.workflow-checkpoint]
        retention: configured_store_policy
        validation: cgeid_v1_observation_list
      - name: revision_and_digest
        type: revision_digest
        required: true
        nullable: false
        description: Deterministic set revision and digest.
        source: fact_engine
        trust: derived
        sensitivity: operational
        protection: hash_only
        persistence: [synora.store.workflow-checkpoint]
        retention: configured_store_policy
        validation: digest_consistency

  - id: synora.cge.hypothesis-set.v1
    category: hypothesis
    owner: cge_hypotheses
    producers: [hypothesis_engine]
    consumers: [evidence_engine, workflow, diagnostics]
    transport: internal
    persistence: [synora.store.cge-journal, synora.store.workflow-wal, synora.store.workflow-checkpoint]
    authority: advisory
    trust: derived
    sensitivity: sensitive_personal
    status: experimental
    fields:
      - name: hypothesis_set_id
        type: protected_or_derived_identifier
        required: true
        nullable: false
        description: Versioned hypothesis set identity.
        source: hypothesis_engine
        trust: derived
        sensitivity: sensitive_personal
        protection: derived_fingerprint_only
        persistence: [synora.store.cge-journal, synora.store.workflow-wal]
        retention: configured_store_policy
        validation: non_empty_bounded
      - name: alternatives
        type: hypothesis_alternative_list
        required: true
        nullable: false
        description: Competing interpretations and scores, not decisions.
        source: facts_and_associations
        trust: derived
        sensitivity: sensitive_personal
        protection: cgeid_v1_references
        persistence: [synora.store.cge-journal, synora.store.workflow-wal, synora.store.workflow-checkpoint]
        retention: configured_store_policy
        validation: bounded_ranked_list
      - name: provenance
        type: cognitive_provenance
        required: true
        nullable: false
        description: Source schema, policy, revision and evaluation time.
        source: hypothesis_engine
        trust: derived
        sensitivity: operational
        protection: pseudonymized_references
        persistence: [synora.store.cge-journal, synora.store.workflow-wal, synora.store.workflow-checkpoint]
        retention: configured_store_policy
        validation: provenance_complete

  - id: synora.cge.evidence-evaluation.v1
    category: evidence
    owner: cge_evidence
    producers: [evidence_engine]
    consumers: [hypothesis_engine, situation_engine, workflow]
    transport: internal
    persistence: [synora.store.cge-journal, synora.store.workflow-wal, synora.store.workflow-checkpoint]
    authority: advisory
    trust: corroborated
    sensitivity: sensitive_personal
    status: experimental
    fields:
      - name: evaluation_id
        type: derived_identifier
        required: true
        nullable: false
        description: Deterministic evidence evaluation identity.
        source: evidence_engine
        trust: derived
        sensitivity: operational
        protection: derived_fingerprint_only
        persistence: [synora.store.cge-journal, synora.store.workflow-wal]
        retention: configured_store_policy
        validation: non_empty_bounded
      - name: evidence_references
        type: protected_reference_list
        required: true
        nullable: false
        description: Source observations and facts supporting the evaluation.
        source: observation_and_fact_sets
        trust: corroborated
        sensitivity: sensitive_personal
        protection: cgeid_v1_references
        persistence: [synora.store.cge-journal, synora.store.workflow-wal]
        retention: configured_store_policy
        validation: references_resolve
      - name: assessment
        type: bounded_assessment
        required: true
        nullable: false
        description: Evidence status and bounded score.
        source: evidence_engine
        trust: corroborated
        sensitivity: operational
        protection: none
        persistence: [synora.store.cge-journal, synora.store.workflow-wal]
        retention: configured_store_policy
        validation: score_bounds

  - id: synora.cge.cognitive-situation.v1
    category: cognitive_situation
    owner: cge_situation
    producers: [situation_engine]
    consumers: [recommendation_engine, comparison, workflow, diagnostics]
    transport: internal
    persistence: [synora.store.workflow-wal, synora.store.workflow-checkpoint]
    authority: advisory
    trust: corroborated
    sensitivity: sensitive_personal
    status: experimental
    fields:
      - name: situation_id
        type: derived_identifier
        required: true
        nullable: false
        description: Bounded cognitive situation identity.
        source: situation_engine
        trust: derived
        sensitivity: sensitive_personal
        protection: derived_fingerprint_only
        persistence: [synora.store.workflow-wal, synora.store.workflow-checkpoint]
        retention: configured_store_policy
        validation: non_empty_bounded
      - name: facts_and_hypotheses
        type: situation_model
        required: true
        nullable: false
        description: Consolidated descriptive model of current evidence.
        source: fact_and_hypothesis_sets
        trust: corroborated
        sensitivity: sensitive_personal
        protection: cgeid_v1_references
        persistence: [synora.store.workflow-wal, synora.store.workflow-checkpoint]
        retention: configured_store_policy
        validation: model_consistency
      - name: markers
        type: authority_markers
        required: true
        nullable: false
        description: Explicit non-authority markers.
        source: cge_situation
        trust: validated
        sensitivity: operational
        protection: none
        persistence: [synora.store.workflow-wal, synora.store.workflow-checkpoint]
        retention: configured_store_policy
        validation: no_action_authority

  - id: synora.cge.recommendation-set.v1
    category: recommendation
    owner: cge_recommendation
    producers: [recommendation_engine]
    consumers: [comparison, diagnostics, advisory_ui]
    transport: internal
    persistence: [synora.store.workflow-wal, synora.store.workflow-checkpoint]
    authority: advisory
    trust: derived
    sensitivity: sensitive_personal
    status: experimental
