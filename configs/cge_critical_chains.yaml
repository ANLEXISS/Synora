critical_chains:
  - id: single_unknown
    name: Inconnu detecte
    danger_score: 0.66
    risk_level: medium
    expected_state: suspicious
    requires_validation: true
    enabled: true
    sequence:
      - event_type: vision.unknown
    proposed_actions:
      - record_clip
      - increase_tracking_frequency
    forbidden_actions:
      - door.unlock
      - siren.turn_on_without_policy

