api_token: synora-dev-token-change-me
allowed_origins:
  - http://localhost:3000
  - http://127.0.0.1:3000
  - http://localhost:5173
  - http://127.0.0.1:5173
device_secrets: {}
pairing_enabled: true
public_system_health: false
max_timestamp_skew_seconds: 30
server:
  http_addr: ":8080"
  https_enabled: true
  https_addr: ":8443"
  tls_cert_file: "/etc/synora/tls/synora.crt"
  tls_key_file: "/etc/synora/tls/synora.key"
  redirect_http_to_https: false

vision:
  face_data_root: "services/vision-worker/data/face"
