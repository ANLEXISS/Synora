# Safe local connectivity template. Remote enrollment is not implemented.
version: 1
enabled: false

interface:
  name: synora0
  listen_port: 41641
  mtu: 1280

control:
  url: ""
  heartbeat_seconds: 30
  reconnect_min_seconds: 2
  reconnect_max_seconds: 60

connection:
  direct_enabled: true
  relay_enabled: true
  direct_timeout_seconds: 8
  keepalive_seconds: 25

security:
  expose_lan: false
  allow_ip_forwarding: false
